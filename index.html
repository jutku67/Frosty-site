<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frosty RP Shop</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050816,#0a1024,#102c66);
color:white;
text-align:center;
}

header{
padding:70px 20px;
}

h1{
font-size:65px;
margin:0;
}

p{
font-size:24px;
color:#cbd5e1;
}

.btn{
display:inline-block;
margin-top:20px;
padding:16px 35px;
background:#1da1ff;
border-radius:14px;
color:white;
font-size:22px;
text-decoration:none;
}

.section{
padding:50px 20px;
}

.box{
background:rgba(255,255,255,0.07);
max-width:320px;
margin:15px;
display:inline-block;
padding:30px;
border-radius:20px;
}

.price{
font-size:50px;
font-weight:bold;
margin:20px 0;
}

.buy{
display:inline-block;
padding:14px 28px;
background:#1da1ff;
border-radius:12px;
color:white;
text-decoration:none;
font-size:22px;
}

.rules{
max-width:700px;
margin:auto;
background:rgba(255,255,255,0.06);
padding:30px;
border-radius:20px;
font-size:22px;
line-height:1.7;
}
</style>
</head>

<body>

<header>
<h1>❄ Frosty RP ❄</h1>
<p>Virallinen FiveM kauppa</p>
<a class="btn" href="https://discord.gg/esimerkki">Liity Discordiin</a>
</header>

<section class="section">
<h2>F-Coin Paketit</h2>

<div class="box">
<h3>5 000 F-Coin</h3>
<div class="price">5€</div>
<a class="buy" href="https://paypal.me/jutku/5">Osta</a>
</div>

<div class="box">
<h3>10 000 F-Coin</h3>
<div class="price">10€</div>
<a class="buy" href="https://paypal.me/jutku/10">Osta</a>
</div>

<div class="box">
<h3>20 000 F-Coin</h3>
<div class="price">20€</div>
<a class="buy" href="https://paypal.me/jutku/20">Osta</a>
</div>

<div class="box">
<h3>50 000 F-Coin</h3>
<div class="price">50€</div>
<a class="buy" href="https://paypal.me/jutku/50">Osta</a>
</div>

</section>

<section class="section">
<h2>Säännöt</h2>
<div class="rules">
Ostot ovat lopullisia.<br>
Toimitus tapahtuu Discordissa.<br>
Noudata Frosty RP sääntöjä.<br>
Kiitos tuesta ❤️
</div>
</section>

</body>
</html>
